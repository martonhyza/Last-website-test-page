<svg width="1024" height="1024" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid High-End Background for Profile Picture -->
  <rect width="100" height="100" fill="#020204" />
  
  <defs>
    <!-- Premium Agency Gradient System -->
    <linearGradient id="cubeTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7D2FE" />
      <stop offset="100%" stop-color="#818CF8" />
    </linearGradient>
    <linearGradient id="cubeL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    <linearGradient id="cubeR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    
    <!-- AI Core Engine Glow -->
    <radialGradient id="aiCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0E7FF" />
      <stop offset="40%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Centered Logo Group -->
  <g transform="translate(0, 4)">
    <!-- Opaque Base Faces (The Cube Body) -->
    <path d="M50 10 L85 25 L50 40 L15 25 Z" fill="url(#cubeTop)" />
    <path d="M50 40 L15 25 L15 70 L50 85 Z" fill="url(#cubeL)" />
    <path d="M50 40 L85 25 L85 70 L50 85 Z" fill="url(#cubeR)" />

    <!-- The Ladder (Left Face - White Tech Detail) -->
    <g transform="translate(20, 37)">
      <line x1="0" y1="0" x2="8" y2="4" stroke="white" stroke-width="1.8" stroke-linecap="round" />
      <line x1="0" y1="9" x2="8" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round" />
      <line x1="0" y1="18" x2="8" y2="22" stroke="white" stroke-width="1.8" stroke-linecap="round" />
      <line x1="0" y1="27" x2="8" y2="31" stroke="white" stroke-width="1.8" stroke-linecap="round" />
      
      <!-- Ladder Rails -->
      <line x1="0" y1="-5" x2="0" y2="35" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" />
      <line x1="8" y1="-1" x2="8" y2="39" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" />
    </g>

    <!-- Structural Edges (Sharp Definition) -->
    <g fill="none" stroke="white" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M50 10 L85 25 L50 40 L15 25 Z" stroke-opacity="0.8" />
      <path d="M15 25 L15 70" stroke-opacity="0.3" />
      <path d="M50 40 L50 85" stroke-opacity="0.5" />
      <path d="M85 25 L85 70" stroke-opacity="0.3" />
      <path d="M15 70 L50 85 L85 70" stroke-opacity="0.8" />
    </g>

    <!-- Glowing Node Accents -->
    <circle cx="50" cy="10" r="1.5" fill="white" filter="url(#glowEffect)" />
    <circle cx="50" cy="40" r="1.5" fill="white" filter="url(#glowEffect)" />
    <circle cx="50" cy="85" r="1.5" fill="white" filter="url(#glowEffect)" />

    <!-- AI Core Engine (High Intensity) -->
    <circle cx="50" cy="47" r="10" fill="url(#aiCore)" fill-opacity="0.6" />
    <circle cx="50" cy="47" r="2.5" fill="white" filter="url(#glowEffect)" />
  </g>
</svg>
